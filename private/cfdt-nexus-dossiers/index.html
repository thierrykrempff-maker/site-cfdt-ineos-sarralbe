<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CFDT Nexus - Dossiers d'accompagnement</title>
    <meta
      name="description"
      content="MVP local CFDT Nexus pour suivre les dossiers d'accompagnement, les checklists, les tâches et les informations manquantes."
    >
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    >
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#workspace">Aller au contenu</a>

    <header class="app-header">
      <div class="brand-block" aria-label="CFDT Nexus">
        <span class="brand-mark">Cfdt.</span>
        <span class="brand-copy">
          <strong>CFDT Nexus</strong>
          <span>Dossiers d'accompagnement</span>
        </span>
      </div>
      <nav class="module-nav" aria-label="Modules CFDT Nexus">
        <a class="module-nav__active" href="index.html" aria-current="page">Dossiers</a>
        <a href="../cfdt-nexus-bibliotheque/index.html">Bibliotheque</a>
        <a href="../../cockpit/index.html">Analyse documentaire</a>
        <a href="../../cockpit/settings.html">Paramètres</a>
      </nav>
      <div class="header-status">
        <span class="status-dot" aria-hidden="true"></span>
        Cockpit V1
      </div>
      <div class="header-actions">
        <button class="button button--ghost" type="button" id="exportDataButton">
          Export JSON
        </button>
        <button class="button button--primary" type="button" id="openCreatePanel">
          Nouveau dossier
        </button>
      </div>
    </header>

    <section class="principle-strip" aria-label="Principe de fonctionnement">
      <strong>L'humain décide toujours.</strong>
      <span>CFDT Nexus suggère, structure et prépare. La validation reste humaine.</span>
    </section>

    <main class="workspace" id="workspace">
      <aside class="case-sidebar" aria-label="Liste des dossiers">
        <section class="panel panel--compact">
          <div class="metric-grid" id="metricGrid"></div>
        </section>

        <section class="panel panel--compact filters">
          <label>
            <span>Recherche</span>
            <input id="searchInput" type="search" placeholder="Nom, alias, sujet">
          </label>
          <div class="filter-row">
            <label>
              <span>Type</span>
              <select id="typeFilter"></select>
            </label>
            <label>
              <span>Statut</span>
              <select id="statusFilter">
                <option value="all">Tous</option>
                <option value="new">Nouveau</option>
                <option value="qualifying">À qualifier</option>
                <option value="active">En cours</option>
                <option value="waiting">En attente</option>
                <option value="escalated">Escaladé</option>
                <option value="closed">Clôturé</option>
              </select>
            </label>
          </div>
        </section>

        <section class="case-list" id="caseList" aria-label="Dossiers"></section>
      </aside>

      <section class="workbench" aria-label="Fiche dossier">
        <section class="create-panel" id="createPanel" hidden>
          <div class="section-heading">
            <div>
              <p class="eyebrow">Création rapide</p>
              <h1>Nouveau dossier d'accompagnement</h1>
            </div>
            <button class="icon-button" type="button" id="closeCreatePanel" aria-label="Fermer">
              <span aria-hidden="true">×</span>
            </button>
          </div>

          <form class="create-form" id="createCaseForm">
            <label>
              <span>Nom, prénom ou alias</span>
              <input name="person" type="text" required placeholder="ex. Salarié A.">
            </label>
            <label>
              <span>Contact préféré</span>
              <input name="contact" type="text" placeholder="Téléphone, mail, WhatsApp">
            </label>
            <label>
              <span>Service ou poste</span>
              <input name="service" type="text" placeholder="Atelier, équipe, poste">
            </label>
            <label>
              <span>Origine</span>
              <select name="origin">
                <option value="terrain">Échange terrain</option>
                <option value="phone">Téléphone</option>
                <option value="mail">Mail</option>
                <option value="whatsapp">WhatsApp</option>
                <option value="form">Formulaire</option>
                <option value="other">Autre</option>
              </select>
            </label>
            <label>
              <span>Type de dossier</span>
              <select name="type" id="createType" required></select>
            </label>
            <label>
              <span>Urgence</span>
              <select name="urgency">
                <option value="normal">Normale</option>
                <option value="watch">À surveiller</option>
                <option value="urgent">Urgente</option>
                <option value="critical">Critique</option>
              </select>
            </label>
            <label>
              <span>Référent CFDT</span>
              <input name="referent" type="text" placeholder="Nom de l'élu référent">
            </label>
            <label>
              <span>Sensibilité</span>
              <select name="sensitivity">
                <option value="standard">Standard</option>
                <option value="sensitive">Sensible</option>
                <option value="very_sensitive">Très sensible</option>
              </select>
            </label>
            <label class="field-wide">
              <span>Résumé court</span>
              <textarea name="summary" rows="3" required placeholder="Situation décrite en quelques lignes factuelles"></textarea>
            </label>
            <label class="field-wide">
              <span>Attente du salarié</span>
              <textarea name="expectation" rows="2" placeholder="Ce que la personne attend de la CFDT"></textarea>
            </label>
            <label class="consent-field field-wide">
              <input name="consent" type="checkbox">
              <span>Le salarié accepte l'accompagnement et la conservation des informations utiles au suivi.</span>
            </label>
            <div class="form-actions field-wide">
              <button class="button button--primary" type="submit">Créer le dossier</button>
              <button class="button button--ghost" type="button" id="cancelCreateCase">Annuler</button>
            </div>
          </form>
        </section>

        <section class="detail-panel" id="caseDetail" aria-live="polite"></section>
      </section>

      <aside class="assistant-panel" id="assistantPanel" aria-label="Assistant de préqualification"></aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
